        <h2>什麼是 Data Pipeline？</h2>
        <p>資料管線是將數據從「來源端」移動到「目的地」的一系列自動化步驟。</p>
        <h3>核心環節：ETL</h3>
        <ul>
            <li><strong>Extract (擷取):</strong> 從資料庫、API 或日誌文件中抓取原始數據。</li>
            <li><strong>Transform (轉換):</strong> 清洗數據、去重、格式轉換及運算。</li>
            <li><strong>Load (載入):</strong> 將處理好的數據存入資料倉庫 (Data Warehouse)。</li>
        </ul>
